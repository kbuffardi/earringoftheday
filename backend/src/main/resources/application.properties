spring.application.name=earringoftheday
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eotd}
spring.datasource.username=${DB_USER:eotd}
spring.datasource.password=${DB_PASSWORD:eotd}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=${SERVER_PORT:8080}
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Frontend URL for redirects after OAuth2 login
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Default admin emails (comma-separated)
app.admin-emails=redrachelmason@gmail.com,mydatacollection@gmail.com

# OAuth2 provider credentials (set via environment variables at deployment time)
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# MICROSOFT_CLIENT_ID, MICROSOFT_CLIENT_SECRET
# APPLE_CLIENT_ID, APPLE_CLIENT_SECRET
# FACEBOOK_CLIENT_ID, FACEBOOK_CLIENT_SECRET

# Instagram Graph API integration
# Set INSTAGRAM_ACCESS_TOKEN to a long-lived access token for the
# earringofthedaywithrachel Instagram account.  When not set, automatic
# Instagram sync is disabled and the admin can still add post URLs manually.
instagram.access-token=${INSTAGRAM_ACCESS_TOKEN:}
# How long to wait before the first sync after startup (ms, default 10 s)
instagram.sync-initial-delay-ms=${INSTAGRAM_SYNC_INITIAL_DELAY_MS:10000}
# How often to re-sync Instagram posts (ms, default 30 min)
instagram.sync-interval-ms=${INSTAGRAM_SYNC_INTERVAL_MS:1800000}

